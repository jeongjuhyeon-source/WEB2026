<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <h2>사용자 등록 신청서</h2>

    </header>
    <main>
        <form action="/action_page.php">
        <fieldset>
        
            <legend>기본 정보(Essential)</legend>
            <label for="name">아이디:</label>
            <br>
            <input type="text"id="name" name="name" placeholder="4~12자 영문/숫자">
            <br>
            <label for="password">비밀번호:</label>
            <br>
            <input type="password"id="password" name="password" >
            <br>
            <label for="email">이메일:</label>
            <br>
            <input type="email"id="email"name="email">
        </fieldset>
        <br>
        <fieldset>
            <legend>부가 정보(Optional)</legend>
            <label for="phone">연락처:</label>
            <br>
            <input type="tel" id="phone" name="phone"placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}">

            <p>관심 분야:</p>
            <input type="checkbox" id="html" name="fav_language1" value="HTML">
            <label for="html">HTML5</label>
            <input type="checkbox" id="css" name="fav_language2" value="CSS">
            <label for="css">CSS3</label>
            <input type="checkbox" id="javascript" name="fav_language3" value="JavaScript">
            <label for="javascript">JavaScript</label><br>
            <label for="vol">숙련도:</label>
            <input type="range" id="vol"name="vol" min="0" max="100" step="10">
            </fieldset>
            <input type="submit" value="가입 신청">
            <input type="reset" value="초기화">
        </fieldset>
        </form>

    </main>
    <footer>
        <a href="index.html">홈으로</a>
        <p>&copy;2026 Web Programming Course.All rights reserved.</p>
    </footer>
    
</body>
</html>
